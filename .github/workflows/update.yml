name: Update Library Availability

on:
  schedule:
    - cron: '0 12 * * *'  # runs daily at noon UTC
  workflow_dispatch:        # also lets you run it manually from GitHub

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run fetch script
        env:
          HARDCOVER_TOKEN: ${{ secrets.HARDCOVER_TOKEN }}
        run: python scripts/fetch_availability.py

      - name: Commit results
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git pull --rebase
          git add data/results.json
          git diff --staged --quiet || git commit -m "Update availability data"
          git push
