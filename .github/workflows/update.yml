name: Update Library Availability

on:
  schedule:
    - cron: '0 8,20 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run fetch script
        env:
          HARDCOVER_TOKEN: ${{ secrets.HARDCOVER_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/fetch_availability.py

      - name: Commit results
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          cp data/results.json /tmp/results.json
          cp data/recommendations.json /tmp/recommendations.json 2>/dev/null || true
          git fetch origin main
          git reset --hard origin/main
          cp /tmp/results.json data/results.json
          cp /tmp/recommendations.json data/recommendations.json 2>/dev/null || true
          git add data/results.json data/recommendations.json
          git diff --staged --quiet || git commit -m "Update availability data"
          git push origin main
